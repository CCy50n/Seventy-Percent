- type: entity
  id: PartGreatRadiant
  parent: [BaseItem, BasePartIndestructable]
  name: "great radiant body part"
  abstract: true
  components:
  - type: Icon # Shitmed Change
    sprite: Mobs/Species/Human/parts.rsi
  - type: BodyPart # Shitmed Change
    species: GreatRadiant
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: Blood
        Quantity: 10

- type: entity
  id: TorsoGreatRadiant
  name: "great radiant torso"
  parent: [PartGreatRadiant, BaseTorso]
  components:
